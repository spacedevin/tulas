[package]
name = "tish-mlx-burn"
version = "0.1.0"
edition = "2021"
description = "Local LLM inference on Apple Silicon using Burn-MLX, Uzu, and Candle"
license = "MIT OR Apache-2.0"

[dependencies]
# Burn-MLX example (burn-mlx 0.1.2 requires burn ^0.16)
burn = { version = "0.16", features = ["train"], optional = true }
burn-mlx = { version = "0.1", optional = true }
safetensors = { version = "0.7", optional = true }

# Uzu example
uzu = { git = "https://github.com/trymirai/uzu", branch = "main", package = "uzu", optional = true }

# Candle example
candle-core = { version = "0.9", features = ["metal"], optional = true }
candle-nn = { version = "0.9", optional = true }
candle-transformers = { version = "0.9", optional = true }
tokenizers = { version = "0.22", features = ["onig"], optional = true }
hf-hub = { version = "0.5", features = ["tokio"], optional = true }
clap = { version = "4", features = ["derive"], optional = true }
anyhow = { version = "1", optional = true }

[features]
default = []
burn-mlx = ["dep:burn", "dep:burn-mlx", "dep:safetensors"]
uzu = ["dep:uzu"]
candle = ["dep:candle-core", "dep:candle-nn", "dep:candle-transformers", "dep:tokenizers", "dep:hf-hub", "dep:clap", "dep:anyhow"]

[[example]]
name = "llm_uzu"
path = "examples/llm_uzu.rs"
required-features = ["uzu"]

[[example]]
name = "llm_burn_mlx"
path = "examples/llm_burn_mlx.rs"
required-features = ["burn-mlx"]

[[example]]
name = "llm_candle"
path = "examples/llm_candle.rs"
required-features = ["candle"]

[[example]]
name = "basic_mlx"
path = "examples/basic_mlx.rs"
required-features = ["burn-mlx"]
